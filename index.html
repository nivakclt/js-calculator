<!doctype html>
<html lang="en" data-bs-theme="light">

<head>
    <title>Title</title>
    <!-- Required meta tags -->
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />

    <!-- Bootstrap CSS v5.3.8 -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous" />
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="./script.js"></script>
    <style>
        .btn {
            width: 100%;
            
        }
    </style>
</head>

<body>
    <div class="d-flex justify-content-center align-items-center" style="min-height: 100vh;">
        <div class="w-50 border border-3 shadow bg-dark text-white p-3">
            <h3 class="text-center mt-3">Calculator</h3>
            <table class="w-100">
                <tr>
                    <td colspan="4">
                        <input id="editor" type="text" class="form-control" readonly>
                    </td>
                </tr>
                <tr>
                    <td colspan="2">
                        <button class="btn btn-danger" onclick="clearEditor()">AC</button>
                    </td>
                    <td colspan="2"> 
                          <button class="btn btn-danger" onclick="deleteLast()">C</button>
                    </td>
                <tr>
                    <td><button class="btn btn-info" onclick="setEditor(event)">9</button></td>
                    <td><button class="btn btn-info" onclick="setEditor(event)">8</button></td>
                    <td><button class="btn btn-info" onclick="setEditor(event)">7</button></td>
                    <td><button class="btn btn-primary" onclick="setEditor(event)">+</button></td>
                </tr>
                <tr>
                    <td><button class="btn btn-info" onclick="setEditor(event)">6</button></td>
                    <td><button class="btn btn-info" onclick="setEditor(event)">5</button></td>
                    <td><button class="btn btn-info" onclick="setEditor(event)">4</button></td>
                    <td><button class="btn btn-primary" onclick="setEditor(event)">-</button></td>
                </tr>
                <tr>
                    <td><button class="btn btn-info" onclick="setEditor(event)">3</button></td>
                    <td><button class="btn btn-info" onclick="setEditor(event)">2</button></td>
                    <td><button class="btn btn-info" onclick="setEditor(event)">1</button></td>
                    <td><button class="btn btn-primary" onclick="setEditor(event)">/</button></td>
                </tr>
                <tr>
                    <td><button class="btn btn-info" onclick="setEditor(event)">0</button></td>
                    <td><button class="btn btn-primary" onclick="setEditor(event)">*</button></td>
                    <td><button class="btn btn-primary" onclick="setEditor(event)">%</button></td>
                    <td><button class="btn btn-warning" onclick="getResult()">=</button></td>
                </tr>
            </table>
</body>

</html>
